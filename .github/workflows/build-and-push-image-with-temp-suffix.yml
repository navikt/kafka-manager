name: Build and push docker image with TEMP-suffix
on: workflow_dispatch
jobs:
  build_and_push:
    permissions:
      contents: 'write'
      id-token: 'write'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'web-app/package-lock.json'

      - name: 'Backend: Build maven artifacts'
        run: mvn -f ./api/pom.xml -B package

      - name: 'Frontend: Install dependencies'
        run: npm ci --legacy-peer-deps --prefix web-app

      - name: 'Frontend: Build assets'
        run: npm run build --prefix web-app

      - name: Create image tag
        run: echo "IMAGE_TAG=$(TZ=\"Europe/Oslo\" date +%Y.%m.%d_%H.%M)-$(git rev-parse --short=12 HEAD)-temp" >> $GITHUB_ENV

      - name: Build and push
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # ratchet:nais/docker-build-push@v0
        id: docker-build-push
        with:
          tag: ${{ env.IMAGE_TAG }}
          team: poao
          image_suffix: 'temp'


      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # ratchet:softprops/action-gh-release@v3.0.0
        with:
          name: Release kafka-manager-temp
          tag_name: ${{ env.IMAGE_TAG }}
          prerelease: true
