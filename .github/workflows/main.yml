name: Build, push and deploy
on:
  workflow_dispatch:
  push:

jobs:
  test-api:
    name: Run backend tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - run: mvn -f ./api/pom.xml -B verify

  test-web-app:
    name: Run frontend tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-app/package-lock.json
          registry-url: https://npm.pkg.github.com
      - run: npm ci --prefix web-app
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
          npm_config_ignore_scripts: "true"
          npm_config_min_release_age: "7"
      - run: npm run test --prefix web-app

  build-and-push:
    name: Build and push (main)
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Create image tag
        run: echo "IMAGE_TAG=$(TZ='Europe/Oslo' date +%Y.%m.%d-%H.%M)-$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web-app/package-lock.json
          registry-url: https://npm.pkg.github.com

      - run: npm ci --prefix web-app
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
          npm_config_ignore_scripts: "true"
          npm_config_min_release_age: "7"

      - run: npm test --prefix web-app

      - run: npm run build --prefix web-app

      - run: mvn -f ./api/pom.xml -B package

      - name: Build and push image
        uses: nais/docker-build-push@v0
        id: docker
        with:
          team: poao
          tag: ${{ env.IMAGE_TAG }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release kafka-manager
          tag_name: ${{ env.IMAGE_TAG }}
          prerelease: false
